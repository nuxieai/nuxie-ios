              if udid:
                print(f"platform=iOS Simulator,id={udid}")
                sys.exit(0)

          print("No available iPhone simulator found", file=sys.stderr)
          sys.exit(1)
          PY
          )"
          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"

      - name: Run flow runtime UI harness
        env:
          CLONED_SOURCE_PACKAGES_DIR_PATH: .xcode-spm
          TEST_DESTINATION: ${{ steps.sim.outputs.destination }}
        run: make test-flow-runtime-ui

      - name: Upload flow runtime UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-runtime-ui-report
          path: test-results/flow-runtime

  integration:
    name: Integration (iOS)
    needs: flow-runtime-ui
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    runs-on: ${{ fromJSON(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && '["macos-latest"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Apple CI
        id: apple-toolchain
        uses: ./.github/actions/setup-apple-ci

      - name: Generate Xcode Project
        run: make generate

      - name: Cache Swift packages
        uses: actions/cache@v4
