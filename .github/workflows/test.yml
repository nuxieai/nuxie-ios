            ${{ runner.os }}-${{ runner.arch }}-${{ steps.apple-toolchain.outputs.xcode-identity }}-spm-

      - name: Resolve Swift packages (pinned)
        run: |
          # Resolution is project-wide; the scheme only satisfies xcodebuild.
          # The workspace Package.resolved seeded by `make generate` pins
          # branch dependencies (nuxieai/rive-ios) to the committed revisions
          # even when the restored .xcode-spm cache holds a stale mirror.
          xcodebuild -resolvePackageDependencies \
            -project NuxieSDK.xcodeproj \
            -scheme NuxieSDKUnitTests \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .xcode-spm
          scripts/sync-package-pins.sh verify

      - name: Run Unit Tests on macOS
        run: |
          xcodebuild test \
            -project NuxieSDK.xcodeproj \
            -scheme NuxieSDKMacUnitTests \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .xcode-spm \
            -resultBundlePath MacUnitTestResults.xcresult \
            -enableCodeCoverage NO

      - name: Upload macOS Unit Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-unit-test-results
          path: MacUnitTestResults.xcresult

  flow-runtime-ui:
    name: Flow Runtime UI (iOS)
    needs: unit
    if: ${{ !cancelled() }}
    runs-on: ${{ fromJSON(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && '["macos-latest"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Apple CI
        id: apple-toolchain
        uses: ./.github/actions/setup-apple-ci

      - name: Generate Xcode Project
        run: make generate

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
