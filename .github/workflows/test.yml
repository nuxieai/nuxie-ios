name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # The two self-hosted listeners share one Mac and one CoreSimulator service.
  # Give fork PRs a disposable group while trusted runs serialize through the FIFO queue.
  group: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && format('nuxie-ios-fork-{0}', github.run_id) || 'nuxie-ios-shared-simulator' }}
  queue: max

jobs:
  apple-ci:
    name: Apple CI
    # The nuxie-macos runner group admits only this reusable workflow at trusted
    # refs. Pinning the caller to the reviewed main commit keeps pull-request
    # YAML from changing the runner-routing decision.
    # GitHub snapshots runner-group workflow authorization when a run is created;
    # rerunning an older check suite does not rebuild that authorization graph.
    uses: nuxieai/nuxie-ios/.github/workflows/_trusted-macos.yml@924b416632fc3d34eca9913d882e8212cc0a3ffd
