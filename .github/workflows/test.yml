name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # The two self-hosted listeners share one Mac and one CoreSimulator service.
  # Give fork PRs a disposable group while trusted runs serialize through the FIFO queue.
  group: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && format('nuxie-ios-fork-{0}', github.run_id) || 'nuxie-ios-shared-simulator' }}
  queue: max

jobs:
  apple-ci:
    name: Apple CI
    # Bootstrap safely with the reusable workflow from this pull request while
    # preventing every PR run, including same-repository PRs, from reaching the
    # persistent runner. After this workflow lands on main, pin `uses` to that
    # immutable commit and remove the override in a follow-up change.
    uses: ./.github/workflows/_trusted-macos.yml
    with:
      force_hosted: ${{ github.event_name == 'pull_request' }}
