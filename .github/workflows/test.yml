name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # The two self-hosted listeners share one Mac and one CoreSimulator service.
  # Give fork PRs a disposable group while trusted runs serialize through the FIFO queue.
  # Fork expressions below are routing only. The nuxie-macos organization runner group's
  # allowlist of admin-pinned workflow refs/SHAs is the self-hosted security boundary.
  group: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && format('nuxie-ios-fork-{0}', github.run_id) || 'nuxie-ios-shared-simulator' }}
  queue: max

jobs:
  unit:
    name: Unit (iOS)
    runs-on: ${{ fromJSON(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && '["macos-latest"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Apple CI
        id: apple-toolchain
        uses: ./.github/actions/setup-apple-ci

      - name: Generate Xcode Project
        run: make generate

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .xcode-spm
          key: ${{ runner.os }}-${{ runner.arch }}-${{ steps.apple-toolchain.outputs.xcode-identity }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ steps.apple-toolchain.outputs.xcode-identity }}-spm-

      - name: Resolve Swift packages (pinned)
        run: |
          # Resolution is project-wide; the scheme only satisfies xcodebuild.
          # The workspace Package.resolved seeded by `make generate` pins
          # branch dependencies (nuxieai/rive-ios) to the committed revisions
          # even when the restored .xcode-spm cache holds a stale mirror.
          xcodebuild -resolvePackageDependencies \
            -project NuxieSDK.xcodeproj \
            -scheme NuxieSDKUnitTests \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .xcode-spm
          scripts/sync-package-pins.sh verify

      - name: Pick iOS Simulator destination
        id: sim
        shell: bash
        run: |
          set -euo pipefail
          DESTINATION="$(python3 - <<'PY'
          import json
          import re
          import subprocess
          import sys

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))
          devices_by_runtime = data.get("devices", {})

          def runtime_version(runtime_id: str):
            match = re.search(r"iOS-(\d+)-(\d+)", runtime_id)
            if match:
              return (int(match.group(1)), int(match.group(2)))
            match = re.search(r"iOS-(\d+)", runtime_id)
            if match:
              return (int(match.group(1)), 0)
            return (-1, -1)

          runtimes = sorted(
            (r for r in devices_by_runtime.keys() if "iOS" in r),
            key=runtime_version,
            reverse=True,
          )

          for runtime in runtimes:
            for device in devices_by_runtime.get(runtime, []):
              if not device.get("isAvailable"):
                continue
              name = device.get("name") or ""
              if "iPhone" not in name:
                continue
              udid = device.get("udid")
              if udid:
                print(f"platform=iOS Simulator,id={udid}")
                sys.exit(0)

          print("No available iPhone simulator found", file=sys.stderr)
          sys.exit(1)
          PY
          )"
          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"

      - name: Run Unit Tests on iOS Simulator
        run: |
          COVERAGE=NO
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            COVERAGE=YES
          fi

          xcodebuild test \
            -project NuxieSDK.xcodeproj \
            -scheme NuxieSDKUnitTests \
            -destination '${{ steps.sim.outputs.destination }}' \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .xcode-spm \
            -resultBundlePath UnitTestResults.xcresult \
            -enableCodeCoverage "$COVERAGE"

      - name: Upload Unit Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: UnitTestResults.xcresult

  macos-build:
    name: Build (macOS)
    runs-on: ${{ fromJSON(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && '["macos-latest"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Apple CI
        id: apple-toolchain
        uses: ./.github/actions/setup-apple-ci

      - name: Generate Xcode Project
        run: make generate

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .xcode-spm
          key: ${{ runner.os }}-${{ runner.arch }}-${{ steps.apple-toolchain.outputs.xcode-identity }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ steps.apple-toolchain.outputs.xcode-identity }}-spm-

      - name: Resolve Swift packages (pinned)
        run: |
          # Resolution is project-wide; the scheme only satisfies xcodebuild.
          # The workspace Package.resolved seeded by `make generate` pins
          # branch dependencies (nuxieai/rive-ios) to the committed revisions
          # even when the restored .xcode-spm cache holds a stale mirror.
          xcodebuild -resolvePackageDependencies \
            -project NuxieSDK.xcodeproj \
            -scheme NuxieSDKUnitTests \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .xcode-spm
          scripts/sync-package-pins.sh verify

      - name: Build macOS Framework
        run: |
          xcodebuild build \
            -project NuxieSDK.xcodeproj \
            -scheme NuxieSDKMac \
            -destination 'generic/platform=macOS' \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .xcode-spm

  macos-unit:
    name: Unit (macOS)
    runs-on: ${{ fromJSON(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && '["macos-latest"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Apple CI
        id: apple-toolchain
        uses: ./.github/actions/setup-apple-ci

      - name: Generate Xcode Project
        run: make generate

