          key: ${{ runner.os }}-${{ runner.arch }}-${{ runner.name }}-${{ steps.apple-toolchain.outputs.xcode-identity }}-spm-ios-v2-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ runner.name }}-${{ steps.apple-toolchain.outputs.xcode-identity }}-spm-ios-v2-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project NuxieSDK.xcodeproj \
            -scheme NuxieSDKUnitTests \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .xcode-spm

      - name: Pick iOS Simulator destination
        id: sim
        shell: bash
        run: |
          set -euo pipefail
          DESTINATION="$(python3 - <<'PY'
          import json
          import re
          import subprocess
          import sys

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))
          devices_by_runtime = data.get("devices", {})

          def runtime_version(runtime_id: str):
            match = re.search(r"iOS-(\d+)-(\d+)", runtime_id)
            if match:
              return (int(match.group(1)), int(match.group(2)))
            match = re.search(r"iOS-(\d+)", runtime_id)
            if match:
              return (int(match.group(1)), 0)
            return (-1, -1)

          runtimes = sorted(
            (r for r in devices_by_runtime.keys() if "iOS" in r),
            key=runtime_version,
