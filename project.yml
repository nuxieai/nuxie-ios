name: NuxieSDK
options:
  bundleIdPrefix: com.nuxie
  deploymentTarget:
    iOS: 15.0
    macOS: 12.0
  generateEmptyDirectories: true
  groupSortPosition: top
  
packages:
  Quick:
    url: https://github.com/Quick/Quick.git
    from: 7.0.0
  Nimble:
    url: https://github.com/Quick/Nimble.git
    from: 13.0.0
  Factory:
    url: https://github.com/hmlongco/Factory.git
    from: 2.5.0
  RiveRuntime:
    url: https://github.com/nuxieai/rive-ios.git
    branch: main
    
targets:
  NuxieSDK:
    type: framework
    platform: iOS
    sources:
      - path: Sources/Nuxie
        name: Nuxie
        excludes:
          - "**/*.md"
          - Flows/Runtime/FlowRuntimeArtifactAdapter.swift
          - Flows/Runtime/FlowRuntimeFrameClock.swift
          - Flows/Runtime/FlowRuntimeHost.swift
          - Flows/Runtime/FlowRuntimeSurfaceView.swift
          - Flows/Runtime/NuxieRuntimeAdapter.swift
          - Flows/Runtime/NuxieRuntimeImportRequest.swift
          - Flows/Runtime/NuxieRuntimeResultDecoder.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeFrameClock.swift
        name: FlowRuntimeFrameClock.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeArtifactAdapter.swift
        name: FlowRuntimeArtifactAdapter.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeHost.swift
        name: FlowRuntimeHost.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeSurfaceView.swift
        name: FlowRuntimeSurfaceView.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeAdapter.swift
        name: NuxieRuntimeAdapter.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeImportRequest.swift
        name: NuxieRuntimeImportRequest.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeResultDecoder.swift
        name: NuxieRuntimeResultDecoder.swift
    dependencies:
      - package: Factory
        product: FactoryKit
      - package: RiveRuntime
        product: RiveRuntime
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk
      PRODUCT_NAME: Nuxie
      MARKETING_VERSION: 0.1.0
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: 5.9
      ENABLE_TESTABILITY: YES
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""

  NuxieSDKMac:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Nuxie
        name: Nuxie
        excludes:
          - "**/*.md"
          - Flows/Runtime/FlowRuntimeArtifactAdapter.swift
          - Flows/Runtime/FlowRuntimeFrameClock.swift
          - Flows/Runtime/FlowRuntimeHost.swift
          - Flows/Runtime/FlowRuntimeSurfaceView.swift
          - Flows/Runtime/NuxieRuntimeAdapter.swift
          - Flows/Runtime/NuxieRuntimeImportRequest.swift
          - Flows/Runtime/NuxieRuntimeResultDecoder.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeFrameClock.swift
        name: FlowRuntimeFrameClock.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeArtifactAdapter.swift
        name: FlowRuntimeArtifactAdapter.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeHost.swift
        name: FlowRuntimeHost.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeSurfaceView.swift
        name: FlowRuntimeSurfaceView.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeAdapter.swift
        name: NuxieRuntimeAdapter.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeImportRequest.swift
        name: NuxieRuntimeImportRequest.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeResultDecoder.swift
        name: NuxieRuntimeResultDecoder.swift
    dependencies:
      - package: Factory
        product: FactoryKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.macos
      PRODUCT_NAME: Nuxie
      MARKETING_VERSION: 0.1.0
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: 5.9
      ENABLE_TESTABILITY: YES
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""

  NuxieTestSupportiOS:
    type: framework
    platform: iOS
    sources:
      - path: Tests/NuxieTestSupport
        name: NuxieTestSupport
    dependencies:
      - target: NuxieSDK
      - package: Quick
      - package: Nimble
      - package: Factory
        product: FactoryKit
      - sdk: XCTest.framework
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.testsupport.ios
      PRODUCT_NAME: NuxieTestSupport
      PRODUCT_MODULE_NAME: NuxieTestSupport
      ENABLE_TESTABILITY: YES
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""

  NuxieTestSupportMac:
    type: framework
    platform: macOS
    sources:
      - path: Tests/NuxieTestSupport
        name: NuxieTestSupport
    dependencies:
      - target: NuxieSDKMac
      - package: Quick
      - package: Nimble
      - package: Factory
        product: FactoryKit
      - sdk: XCTest.framework
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.testsupport.macos
      PRODUCT_NAME: NuxieTestSupport
      PRODUCT_MODULE_NAME: NuxieTestSupport
      ENABLE_TESTABILITY: YES
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""
      
  NuxieSDKUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/NuxieUnitTests
        name: NuxieUnitTests
      - path: Tests/FlowRuntimeHostApp/Fixtures/published-font
        type: folder
      - path: Tests/FlowRuntimeHostApp/Fixtures/pressable-interaction
        type: folder
      - path: Tests/FlowRuntimeHostApp/Fixtures/text-input-motion
        type: folder
    dependencies:
      - target: NuxieSDK
      - target: NuxieTestSupportiOS
      - package: Quick
      - package: Nimble
      - package: Factory
        product: FactoryKit
      - package: RiveRuntime
        product: RiveRuntime
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.unittests
      TEST_HOST: ""
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) SWIFT_PACKAGE
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""
    scheme:
      testTargets:
        - NuxieSDKUnitTests
      gatherCoverageData: true

  NuxieSDKMacUnitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NuxieUnitTests
        name: NuxieUnitTests
    dependencies:
      - target: NuxieSDKMac
      - target: NuxieTestSupportMac
      - package: Quick
      - package: Nimble
      - package: Factory
        product: FactoryKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.macos.unittests
      TEST_HOST: ""
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) SWIFT_PACKAGE
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""
    scheme:
      testTargets:
        - NuxieSDKMacUnitTests
      gatherCoverageData: true

  NuxieSDKIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/NuxieIntegrationTests
        name: NuxieIntegrationTests
    dependencies:
      - target: NuxieSDK
      - target: NuxieTestSupportiOS
      - package: Quick
      - package: Nimble
      - package: Factory
        product: FactoryKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.integrationtests
      TEST_HOST: ""
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) SWIFT_PACKAGE
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""
    scheme:
      testTargets:
        - NuxieSDKIntegrationTests
      gatherCoverageData: false

  NuxieFlowRuntimeHostApp:
    type: application
    platform: iOS
    sources:
      - path: Tests/FlowRuntimeHostApp/Sources
        name: FlowRuntimeHostApp
      - path: Tests/FlowRuntimeHostApp/Fixtures
        type: folder
    dependencies:
      - target: NuxieSDK
      - package: RiveRuntime
        product: RiveRuntime
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.flow-runtime-host
      PRODUCT_NAME: NuxieFlowRuntimeHost
      MARKETING_VERSION: 0.1.0
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: 5.9
      INFOPLIST_FILE: Tests/FlowRuntimeHostApp/Sources/Info.plist
      SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
      SUPPORTS_MACCATALYST: NO
      TARGETED_DEVICE_FAMILY: "1,2"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""

  NuxieFlowRuntimeReferenceApp:
    type: application
    platform: iOS
    sources:
      - path: Examples/FlowRuntimeReferenceApp/Sources
        name: FlowRuntimeReferenceApp
      - path: Tests/FlowRuntimeHostApp/Fixtures
        type: folder
      - path: Sources/Nuxie/Flows/Runtime/FlowContainCenterTransform.swift
        name: FlowContainCenterTransform.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeFrameClock.swift
        name: FlowRuntimeFrameClock.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeHost.swift
        name: FlowRuntimeHost.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimePointerInput.swift
        name: FlowRuntimePointerInput.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeSessionTypes.swift
        name: FlowRuntimeSessionTypes.swift
      - path: Sources/Nuxie/Flows/FlowRuntimeFontRegistry.swift
        name: FlowRuntimeFontRegistry.swift
      - path: Sources/Nuxie/Flows/Runtime/FlowRuntimeSurfaceView.swift
        name: FlowRuntimeSurfaceView.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeAdapter.swift
        name: NuxieRuntimeAdapter.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeImportRequest.swift
        name: NuxieRuntimeImportRequest.swift
      - path: Sources/Nuxie/Flows/Runtime/NuxieRuntimeResultDecoder.swift
        name: NuxieRuntimeResultDecoder.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.flow-runtime-reference
      PRODUCT_NAME: NuxieFlowRuntimeReference
      MARKETING_VERSION: 0.1.0
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: 5.9
      INFOPLIST_FILE: Examples/FlowRuntimeReferenceApp/Sources/Info.plist
      SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
      SUPPORTS_MACCATALYST: NO
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""

  NuxieE2EApp:
    type: application
    platform: iOS
    sources:
      - path: Examples/E2EApp/Sources
        name: E2EApp
    dependencies:
      - target: NuxieSDK
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: io.nuxie.e2eapp
      PRODUCT_NAME: NuxieE2EApp
      MARKETING_VERSION: 1.0
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: 5.9
      INFOPLIST_FILE: Examples/E2EApp/Sources/App/Info.plist
      SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
      SUPPORTS_MACCATALYST: NO
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""

  NuxieE2EAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Examples/E2EApp/Tests/Unit
        name: E2EAppTests
    dependencies:
      - target: NuxieE2EApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: io.nuxie.e2eapp.tests
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""

  NuxieE2EAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Examples/E2EApp/Tests/UI
        name: E2EAppUITests
    dependencies:
      - target: NuxieE2EApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: io.nuxie.e2eapp.uitests
      GENERATE_INFOPLIST_FILE: YES
      SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
      SUPPORTS_MACCATALYST: NO
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""

  NuxieFlowRuntimeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/FlowRuntimeUITests
        name: FlowRuntimeUITests
    dependencies:
      - target: NuxieFlowRuntimeHostApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.flow-runtime-uitests
      GENERATE_INFOPLIST_FILE: YES
      SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
      SUPPORTS_MACCATALYST: NO
      TARGETED_DEVICE_FAMILY: "1,2"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""
    scheme:
      testTargets:
        - NuxieFlowRuntimeUITests
      gatherCoverageData: false

  NuxieFlowRuntimeReferenceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/FlowRuntimeReferenceUITests
        name: FlowRuntimeReferenceUITests
    dependencies:
      - target: NuxieFlowRuntimeReferenceApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nuxie.sdk.flow-runtime-reference-uitests
      GENERATE_INFOPLIST_FILE: YES
      SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
      SUPPORTS_MACCATALYST: NO
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""
    scheme:
      testTargets:
        - NuxieFlowRuntimeReferenceUITests
      gatherCoverageData: false

schemes:
  NuxieSDK:
    build:
      targets:
        NuxieSDK: all
    test:
      targets:
        - NuxieSDKUnitTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release

  NuxieSDKMac:
    build:
      targets:
        NuxieSDKMac: all
    run:
      config: Debug
    archive:
      config: Release

  NuxieFlowRuntimeReferenceApp:
    build:
      targets:
        NuxieFlowRuntimeReferenceApp: all
    run:
      config: Debug
    archive:
      config: Release

  NuxieFlowRuntimeReferenceUITests:
    build:
      targets:
        NuxieFlowRuntimeReferenceApp: all
        NuxieFlowRuntimeReferenceUITests: all
    test:
      targets:
        - NuxieFlowRuntimeReferenceUITests
      gatherCoverageData: false

  NuxieSDKUnitTests:
    build:
      targets:
        NuxieSDK: all
    test:
      targets:
        - NuxieSDKUnitTests
      gatherCoverageData: true

  NuxieSDKMacUnitTests:
    build:
      targets:
        NuxieSDKMac: all
    test:
      targets:
        - NuxieSDKMacUnitTests
      gatherCoverageData: true

  NuxieSDKIntegrationTests:
    build:
      targets:
        NuxieSDK: all
    test:
      targets:
        - NuxieSDKIntegrationTests
      gatherCoverageData: false

  NuxieFlowRuntimeUITests:
    build:
      targets:
        NuxieFlowRuntimeHostApp: all
        NuxieFlowRuntimeUITests: all
    test:
      targets:
        - NuxieFlowRuntimeUITests
      gatherCoverageData: false

  NuxieSDKE2ETests:
    build:
      targets:
        NuxieE2EApp: all
        NuxieE2EAppTests: all
        NuxieE2EAppUITests: all
    test:
      targets:
        - NuxieE2EAppTests
        - NuxieE2EAppUITests
      gatherCoverageData: false
